services:
  postgres:
    image: postgres:16-alpine
    container_name: tap-miniapp-postgres
    environment:
      POSTGRES_USER: tapmini
      POSTGRES_PASSWORD: tapmini
      POSTGRES_DB: tapmini
    ports:
      - "5432:5432"
    volumes:
      - tap_miniapp_pg:/var/lib/postgresql/data

volumes:
  tap_miniapp_pg:
